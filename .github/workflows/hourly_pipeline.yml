name: hourly-pipeline
# Free automation: ingest odds -> enrich context -> price bets -> LLM briefings.
# Public repos get unlimited Actions minutes.

on:
  schedule:
    - cron: "17 * * * *"          # hourly at :17 (avoid the top-of-hour rush)
  workflow_dispatch: {}

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      LLM_PROVIDER: groq
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      # Seasonal: keep this list to in-season sports to conserve Odds API credits.
      # Summer: mlb worldcup | Fall/winter: nba nfl nhl epl
      - name: Ingest live odds (budgeted)
        run: python -m src.ingestion.odds_ingest mlb worldcup
      - name: Deep-data enrichment (weather, travel, injuries, sentiment)
        run: python -m src.ingestion.deep_data
      - name: Price bets (EV + Kelly)
        run: python -m src.betting.value_engine mlb worldcup
      - name: LLM analyst briefings
        run: python -m src.llm.analyst_agent
