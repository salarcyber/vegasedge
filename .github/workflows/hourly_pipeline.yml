name: hourly-pipeline
# Free automation: ingest odds -> enrich context -> price bets -> LLM briefings.
# Public repos get unlimited Actions minutes.

on:
  schedule:
    - cron: "17 * * * *"          # hourly at :17 (avoid the top-of-hour rush)
  workflow_dispatch: {}

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      LLM_PROVIDER: groq
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      # Seasonal: keep this list to in-season sports to conserve Odds API credits.
      # Summer: mlb worldcup mls | Fall/winter: nba nfl nhl epl ucl laliga
      # Odds cost credits, so fetch only 3x/day (US betting windows); the rest
      # of the pipeline below still runs hourly for free.
      - name: Ingest live odds (budgeted, 3x daily)
        run: |
          H=$(date -u +%H)
          if [ "$H" = "13" ] || [ "$H" = "19" ] || [ "$H" = "23" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python -m src.ingestion.odds_ingest mlb worldcup mls
          else
            echo "off-window hour $H UTC — skipping odds fetch to save credits"
          fi
      - name: Deep-data enrichment (weather, travel, injuries, sentiment)
        run: python -m src.ingestion.deep_data
      - name: Starting pitchers (MLB)
        run: python -m src.ingestion.pitchers current
      - name: Price bets (EV + Kelly)
        run: python -m src.betting.value_engine mlb worldcup mls
      - name: LLM analyst briefings
        run: python -m src.llm.analyst_agent
